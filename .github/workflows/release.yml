name: Build and Release

on:
  push:
    tags:
      - 'v*' # 匹配 v 开头的 tag，如 v1.0.0, v1.1.0

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds
          - os: macos-latest
            platform: darwin
            arch: x64
            build-command: make:mac:x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            build-command: make:mac:arm64
          # Windows builds
          - os: windows-latest
            platform: win32
            arch: x64
            build-command: make:win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Update package.json version
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          # 使用 Node.js 更新 package.json 版本号
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = '$VERSION'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "✅ 已更新 package.json 版本号为: $VERSION"
          grep '"version"' package.json

      - name: Build application
        run: pnpm run ${{ matrix.build-command }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts
        id: prepare_artifacts
        shell: bash
        run: |
          # 查找构建产物，根据 forge.config.ts 的 normalizeZipOutputs，文件应该在 out/make/zip/ 根目录
          # CI 环境会保留版本号，文件名格式：desktop-chatgpt-darwin-arm64-1.0.0.zip
          VERSION=${{ steps.get_version.outputs.version }}
          
          if [ "${{ matrix.platform }}" == "darwin" ]; then
            # macOS: 优先查找包含版本号的完整文件名
            ARTIFACT=$(find out/make/zip -name "*darwin-${{ matrix.arch }}-${VERSION}.zip" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              # 如果没找到，尝试查找包含 darwin 和对应架构的 zip 文件（带版本号）
              ARTIFACT=$(find out/make/zip -name "*darwin-${{ matrix.arch }}*.zip" -type f 2>/dev/null | head -1)
            fi
            if [ -z "$ARTIFACT" ]; then
              # 如果还没找到，尝试查找所有 darwin zip
              ARTIFACT=$(find out/make/zip -name "*darwin*.zip" -type f 2>/dev/null | head -1)
            fi
          else
            # Windows: 优先查找包含版本号的完整文件名
            ARTIFACT=$(find out/make/zip -name "*win32-x64-${VERSION}.zip" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              # 如果没找到，尝试查找包含 win32 的 zip 文件
              ARTIFACT=$(find out/make/zip -name "*win32*.zip" -type f 2>/dev/null | head -1)
            fi
            if [ -z "$ARTIFACT" ]; then
              # 如果还没找到，尝试查找包含 windows 的 zip 文件
              ARTIFACT=$(find out/make/zip -name "*windows*.zip" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "❌ 未找到构建产物！"
            echo "当前目录结构："
            ls -la out/make/zip/ 2>/dev/null || echo "out/make/zip 目录不存在"
            find out -name "*.zip" -type f 2>/dev/null || echo "未找到任何 zip 文件"
            exit 1
          fi

          echo "✅ 找到构建产物: $ARTIFACT"
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ steps.prepare_artifacts.outputs.artifact_path }}
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Format build time
        id: format_time
        shell: bash
        run: |
          # 获取构建时间，优先使用 head_commit.timestamp，否则使用 run_started_at
          BUILD_TIME="${{ github.event.head_commit.timestamp || github.run_started_at }}"
          # 转换为 yyyy-MM-dd HH:mm:ss 格式
          # 移除时区信息，只保留日期和时间部分
          TIME_STRIPPED=$(echo "$BUILD_TIME" | sed 's/[+-][0-9][0-9]:[0-9][0-9]$//' | sed 's/Z$//')
          # 使用 date 命令转换为 yyyy-MM-dd HH:mm:ss 格式
          FORMATTED_TIME=$(date -u -d "$TIME_STRIPPED" +"%Y-%m-%d %H:%M:%S" 2>/dev/null || date -u +"%Y-%m-%d %H:%M:%S")
          echo "build_time=$FORMATTED_TIME" >> $GITHUB_OUTPUT
          echo "构建时间: $FORMATTED_TIME"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "📦 构建产物列表："
          find artifacts -name "*.zip" -type f || true
          echo ""
          echo "文件详情："
          ls -lh artifacts/*/*.zip 2>/dev/null || ls -lh artifacts/*.zip 2>/dev/null || true

      - name: Get current date
        id: date
        shell: bash
        run: |
          echo "date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Desktop ChatGPT ${{ steps.get_version.outputs.version }}

            ### 📥 下载

            - **macOS (Intel)**: desktop-chatgpt-darwin-x64-${{ steps.get_version.outputs.version }}.zip
            - **macOS (Apple Silicon)**: desktop-chatgpt-darwin-arm64-${{ steps.get_version.outputs.version }}.zip
            - **Windows (x64)**: desktop-chatgpt-win32-x64-${{ steps.get_version.outputs.version }}.zip
            
            ### 📋 安装说明

            #### macOS
            1. 下载对应架构的 ZIP 文件
            2. 解压并将 `Desktop ChatGPT.app` 拖入「应用程序」文件夹
            3. 首次打开可能需要右键点击 → 打开（绕过安全检查）

            #### Windows
            1. 下载 ZIP 文件并解压
            2. 运行 `Desktop ChatGPT.exe`
            3. 首次运行可能需要允许通过 Windows Defender 防火墙

            ---

            **构建信息：**
            - 构建时间: ${{ steps.format_time.outputs.build_time }}
            - 提交: ${{ github.sha }}
          files: |
            artifacts/**/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true

      - name: Sync version and merge to main
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TARGET_BRANCH=${{ github.event.repository.default_branch }}
          
          # 获取触发 tag 的源分支
          SOURCE_BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD | head -1 | sed 's/origin\///' | xargs)
          echo "源分支: $SOURCE_BRANCH"
          echo "目标分支: $TARGET_BRANCH"
          echo "版本号: $VERSION"

          # 配置 git 机器人
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 获取最新代码
          git fetch origin --prune

          # 切换到目标分支
          git checkout $TARGET_BRANCH
          git pull origin $TARGET_BRANCH --rebase

          # 合并源分支到目标分支（如果源分支不是目标分支本身）
          if [ "$SOURCE_BRANCH" != "$TARGET_BRANCH" ] && [ -n "$SOURCE_BRANCH" ]; then
            echo "🔀 合并 $SOURCE_BRANCH 到 $TARGET_BRANCH..."
            git merge origin/$SOURCE_BRANCH --no-edit -m "chore: merge $SOURCE_BRANCH after release $VERSION [skip ci]" || {
              echo "⚠️ 合并存在冲突，尝试使用 theirs 策略..."
              git merge origin/$SOURCE_BRANCH --no-edit -X theirs -m "chore: merge $SOURCE_BRANCH after release $VERSION [skip ci]"
            }
          fi

          # 更新版本号 (不产生新 tag)
          npm version $VERSION --no-git-tag-version || true

          # 检查是否有变化需要提交
          if git diff --quiet package.json; then
            echo "✅ 版本号已同步，无需额外提交"
          else
            git add package.json
            git add package-lock.json pnpm-lock.yaml 2>/dev/null || true
            git commit -m "chore: bump version to $VERSION [skip ci]"
          fi

          # 推送更改
          git push origin $TARGET_BRANCH
          echo "✅ 已成功合并并推送到 $TARGET_BRANCH"
